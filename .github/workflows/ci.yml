name: CI
on:
  pull_request:
  push:
    branches: [main, development]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }  # debe coincidir con pnpm local; pnpm-workspace.yaml usa claves de v10
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }  # 22+ trae WebSocket nativo (lo exige @supabase/realtime-js)
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm test
      - run: pnpm build
        env:
          # build de Next: envs públicas dummy para CI (no se conecta a Supabase real)
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          APP_ENV: development
          # env del servidor (env.server.ts los valida al colectar las rutas /api): dummies para CI
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
          RESEND_API_KEY: re_dummy_key

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      - run: pnpm install --frozen-lockfile
      # `supabase start` levanta Postgres+Auth+REST locales y aplica supabase/migrations.
      - run: supabase start
      - run: pnpm exec playwright install --with-deps chromium
      - name: e2e (Playwright contra Supabase local)
        run: pnpm e2e
        env:
          # Keys demo de Supabase local (públicas, deterministas — NO secretos).
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
          APP_ENV: development
          RESEND_API_KEY: re_dummy_key
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
